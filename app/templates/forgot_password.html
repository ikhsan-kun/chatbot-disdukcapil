{% extends "base.html" %}
{% block content %}

<section class="login-section">

    <div class="login-card" style="max-width: 450px;">

        <div class="login-icon" style="background: var(--warning-light, #fef3c7); color: var(--warning, #d97706);">
            🔒
        </div>

        <h2>Lupa Password</h2>

        <p class="login-subtitle">
            Masukkan NIK dan password baru Anda untuk mereset password
        </p>

        {% if error %}
        <div style="background-color: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-weight: 600; font-size: 14px; text-align: left;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div style="background-color: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-weight: 600; font-size: 14px; text-align: left;">
            ✅ {{ success }}
        </div>
        {% endif %}

        <form method="POST" action="/forgot-password">

            <!-- NIK -->
            <label for="nik">NIK</label>
            <input
                type="text"
                id="nik"
                name="nik"
                placeholder="Masukkan 16 digit NIK"
                maxlength="16"
                required
                oninput="this.value=this.value.replace(/\D/g,'').slice(0,16);"
            >
            <small id="nikWarning" class="warning-text"></small>

            <!-- PASSWORD BARU -->
            <label for="new_password">Password Baru</label>
            <div class="password-box">
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="Password Baru (min. 6 karakter)"
                    required
                >
                <span class="show-password" onclick="toggleNewPassword()" id="eyeIconNew">
                    <!-- EYE OPEN -->
                    <svg id="iconShowNew" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <!-- EYE SLASH -->
                    <svg id="iconHideNew" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </span>
            </div>

            <!-- KONFIRMASI PASSWORD BARU -->
            <label for="confirm_new_password">Konfirmasi Password Baru</label>
            <div class="password-box">
                <input
                    type="password"
                    id="confirm_new_password"
                    name="confirm_new_password"
                    placeholder="Ulangi Password Baru"
                    required
                >
                <span class="show-password" onclick="toggleConfirmPassword()" id="eyeIconConfirm">
                    <!-- EYE OPEN -->
                    <svg id="iconShowConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <!-- EYE SLASH -->
                    <svg id="iconHideConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </span>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-login" style="margin-top: 16px;">
                Reset Password
            </button>

        </form>

        <p class="register-link">
            Kembali ke
            <a href="/login">
                Halaman Masuk
            </a>
        </p>

    </div>

</section>

<!-- JAVASCRIPT -->
<script>
// ==========================
// TOGGLE PASSWORD VISIBILITY
// ==========================
function toggleNewPassword() {
    const input = document.getElementById("new_password");
    const iconShow = document.getElementById("iconShowNew");
    const iconHide = document.getElementById("iconHideNew");
    if (input.type === "password") {
        input.type = "text";
        iconShow.style.display = "none";
        iconHide.style.display = "inline";
    } else {
        input.type = "password";
        iconShow.style.display = "inline";
        iconHide.style.display = "none";
    }
}

function toggleConfirmPassword() {
    const input = document.getElementById("confirm_new_password");
    const iconShow = document.getElementById("iconShowConfirm");
    const iconHide = document.getElementById("iconHideConfirm");
    if (input.type === "password") {
        input.type = "text";
        iconShow.style.display = "none";
        iconHide.style.display = "inline";
    } else {
        input.type = "password";
        iconShow.style.display = "inline";
        iconHide.style.display = "none";
    }
}

// ==========================
// VALIDASI NIK & FORM
// ==========================
const nikInput = document.getElementById("nik");
if (nikInput) {
    nikInput.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 16);
        const warning = document.getElementById("nikWarning");
        if (this.value.length > 0 && this.value.length < 16) {
            warning.innerText = "⚠️ NIK harus 16 digit (saat ini " + this.value.length + " digit)";
        } else {
            warning.innerText = "";
        }
    });
}

document.querySelector('form').addEventListener('submit', function(e) {
    if (!this.checkValidity()) {
        e.preventDefault();
        showToast("Mohon lengkapi data yang sesuai", "error");
        return;
    }

    const nikVal = nikInput.value;
    if (!nikVal.startsWith("3376")) {
        e.preventDefault();
        showToast("Pengisian NIK harus diawali 3376", "error");
        nikInput.focus();
        return;
    }

    const newPw = document.getElementById("new_password").value;
    const confirmPw = document.getElementById("confirm_new_password").value;

    if (newPw.length < 6) {
        e.preventDefault();
        showToast("Password baru minimal 6 karakter", "error");
        return;
    }

    if (newPw !== confirmPw) {
        e.preventDefault();
        showToast("Konfirmasi password baru tidak cocok", "error");
        return;
    }
});
</script>

{% endblock %}
